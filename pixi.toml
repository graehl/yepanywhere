[workspace]
name = "yepanywhere"
channels = ["conda-forge"]
platforms = ["linux-64"]

[environments]
stt = { features = ["stt"] }

[feature.stt.dependencies]
python = ">=3.11,<3.13"
pip = ">=25"
ffmpeg = ">=7"

[feature.stt.tasks]
stt-install = "python -m pip install --requirement requirements/stt.txt"
stt-install-parakeet = "python -m pip install --requirement requirements/stt-parakeet.txt"
stt-check = "python -c \"from faster_whisper import WhisperModel; print('faster-whisper import OK')\""
stt-check-parakeet = "python -c \"import torch; from transformers import pipeline; print('parakeet transformers import OK')\""
stt-bootstrap = { depends-on = ["stt-install", "stt-check"] }
stt-bootstrap-parakeet = { depends-on = ["stt-install-parakeet", "stt-check-parakeet"] }
stt-bootstrap-all = { depends-on = ["stt-bootstrap", "stt-bootstrap-parakeet"] }
